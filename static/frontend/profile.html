<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Perfil | TaskForge</title>
    <link rel="icon" href="https://api.taskforge.app.br/static/icons/TaskForgeLogo.png">
    <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body data-page="profile">
    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>
    <section class="app-shell">

      <aside class="sidebar sidebar-clean">
        <div class="brand-lockup sidebar-brand">
          <img class="brand-mark" src="https://api.taskforge.app.br/static/icons/TaskForgeLogo.png" alt="TaskForge">
          <strong class="brand-label">TaskForge</strong>
        </div>
        <nav class="page-nav" aria-label="Navegação principal">
          <a class="nav-link" href="./dashboard.html">
            <span class="nav-icon">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/></svg>
            </span>
            <span class="nav-label">Organizações</span>
          </a>
          <a class="nav-link active" href="#">
            <span class="nav-icon">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5.5" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M2 15c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            </span>
            <span class="nav-label">Perfil</span>
          </a>
        
          <button class="nav-link" id="open-chat-drawer" type="button" aria-label="Chats">
            <span class="nav-icon">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M14 9.5A5.5 5.5 0 018.5 15H3a1 1 0 01-1-1V9.5a5.5 5.5 0 0111 0z" stroke="currentColor" stroke-width="1.4"/><path d="M5 7V2.5A1.5 1.5 0 016.5 1h6A1.5 1.5 0 0114 2.5V7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </span>
            <span class="nav-label">Chats</span>
          </button>
        </nav>

        <div class="sidebar-spacer"></div>

        <div class="sidebar-user">
          <div class="avatar-upload-wrap">
            <span class="avatar avatar-upload" data-current-avatar>
              <span class="avatar-upload-hint">✎</span>
            </span>
            <input id="pfp-upload-input" type="file" accept="image/jpeg,image/png,image/gif" class="sr-only">
          </div>
          <div class="sidebar-user-info">
            <strong data-current-user>Usuário</strong>
            <span>Conta ativa</span>
          </div>
          <button data-logout class="icon-menu sidebar-logout" type="button" aria-label="Sair">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10.5 5.5L13 8l-2.5 2.5M13 8H6M6 2.5H3.5A1 1 0 002.5 3.5v9a1 1 0 001 1H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="topbar-org-heading">
            <span id="profile-avatar" class="avatar avatar-large"></span>
            <div>
              <p class="eyebrow">Perfil</p>
              <h1 id="profile-username">Carregando</h1>
              <p id="profile-date" class="muted" style="font-size:0.875rem;margin-top:2px;"></p>
            </div>
          </div>
          <div class="topbar-actions">
            <span id="api-status" class="status-chip">API pronta</span>
            <button id="profile-invite-btn" class="primary-button is-hidden" type="button">Convidar</button>
          </div>
        </header>

        <section id="profile-access-panel" class="empty-state is-hidden">
          <div>
            <p class="eyebrow">Perfil</p>
            <h2>Usuário não encontrado.</h2>
          </div>
        </section>

        <section id="profile-content" class="dashboard-content is-hidden">
          <div class="content-grid two-columns">

            <section class="panel" aria-labelledby="profile-orgs-title">
              <div class="panel-heading">
                <p class="eyebrow">Organizações</p>
                <h2 id="profile-orgs-title">Membro em</h2>
              </div>
              <div id="profile-orgs-list" class="profile-orgs-grid"></div>
            </section>

            <section id="profile-self-panel" class="panel is-hidden" aria-labelledby="profile-edit-title">
              <div class="panel-heading">
                <p class="eyebrow">Configurações</p>
                <h2 id="profile-edit-title">Editar perfil</h2>
              </div>
              <form id="profile-edit-form" class="compact-form">
                <label>
                  Username
                  <input id="profile-edit-username" type="text" minlength="4" maxlength="30" placeholder="Novo username">
                </label>
                <label>
                  Foto de perfil
                  <input id="profile-pfp-input" type="file" accept="image/jpeg,image/png,image/gif">
                </label>
                <div class="inline-form">
                  <button class="primary-button" type="submit">Salvar</button>
                  <button id="remove-pfp-btn" class="ghost-button" type="button">Remover foto</button>
                </div>
              </form>
            </section>

          </div>
        </section>
      </main>
    </section>

    <script src="./js/app.js" defer></script>
  
    <!-- __ Chat Drawer __ -->
    <div id="chat-drawer" class="chat-drawer" aria-hidden="true">
      <div class="chat-drawer-inner">
        <div id="chat-org-list-view" class="chat-view">
          <div class="chat-drawer-header">
            <div><p class="eyebrow">Mensagens</p><h2>Chats</h2></div>
            <button id="close-chat-drawer" class="modal-close-btn" type="button" aria-label="Fechar">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div id="chat-org-list" class="chat-org-list"></div>
        </div>
        <div id="chat-messages-view" class="chat-view is-hidden">
          <div class="chat-drawer-header">
            <button id="chat-back-btn" class="ghost-button chat-back-btn" type="button">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div style="flex:1"><p class="eyebrow">Canal geral</p><h2 id="chat-org-name" style="font-size:1rem;margin:0">—</h2></div>
            <button id="close-chat-drawer-2" class="modal-close-btn" type="button" aria-label="Fechar">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-row">
            <input id="chat-input" type="text" placeholder="Mensagem..." maxlength="1000" autocomplete="off">
            <button id="chat-send-btn" class="primary-button" type="button">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M14 8L2 2l3 6-3 6 12-6z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="chat-backdrop" class="chat-backdrop"></div>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </body>
</html>
