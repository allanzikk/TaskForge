<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Criar conta | TaskForge</title>
    <link rel="icon" href="https://www.taskforge.app.br/static/icons/TaskForgeLogo.png">
    <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body data-page="register">
    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>
    <section class="auth-screen">
      <div class="auth-brand">
        <div class="brand-lockup">
          <img class="brand-mark" src="https://www.taskforge.app.br/static/icons/TaskForgeLogo.png" alt="TaskForge">
          <strong>TaskForge</strong>
        </div>
        <p class="eyebrow">Conta aberta</p>
        <h1>Crie sua primeira organização.</h1>
        <p>Qualquer usuário pode criar uma conta, abrir uma organização e convidar pessoas para participar dos projetos.</p>
      </div>

      <main class="auth-panel" aria-labelledby="auth-title">
        <div class="auth-tabs" role="tablist" aria-label="Autenticação">
          <a class="tab-button as-link" href="./login.html" role="tab" aria-selected="false">Entrar</a>
          <a class="tab-button active as-link" href="./register.html" role="tab" aria-selected="true">Criar conta</a>
        </div>

        <div class="panel-heading">
          <p class="eyebrow">Cadastro</p>
          <h2 id="auth-title">Criar conta</h2>
        </div>

        <form id="register-form" class="stacked-form">
          <label>
            Usuário
            <input id="register-username" name="username" type="text" autocomplete="username" minlength="4" maxlength="30" required>
          </label>
          <label>
            Senha
            <input id="register-password" name="password" type="password" autocomplete="new-password" minlength="8" maxlength="72" required>
          </label>
          <button id="register-submit" class="primary-button" type="submit" style="justify-content:center;">Criar e entrar</button>
        </form>
      </main>
    </section>
    <script src="./js/app.js" defer></script>
  </body>
</html>
