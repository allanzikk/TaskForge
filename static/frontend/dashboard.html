<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Visão geral | TaskForge</title>
    <link rel="icon" href="http://localhost:5000/static/icons/TaskForgeLogo.png">
    <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body data-page="dashboard">
    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>
    <section class="app-shell">
      <aside class="sidebar">
        <div class="brand-lockup sidebar-brand">
          <img class="brand-mark" src="http://localhost:5000/static/icons/TaskForgeLogo.png" alt="TaskForge">
          <strong>TaskForge</strong>
        </div>

        <nav class="page-nav" aria-label="Navegação principal">
          <a class="nav-link active" href="./dashboard.html"><span class="nav-icon">V</span>Visão geral</a>
        </nav>

        <form id="create-org-form" class="compact-form sidebar-form">
          <label>
            Nova organização
            <input id="org-name-input" type="text" minlength="3" maxlength="30" placeholder="Nome" required>
          </label>
          <label>
            Descrição
            <input id="org-description-input" type="text" minlength="3" maxlength="120" placeholder="Descrição" required>
          </label>
          <label>
            Imagem <span class="muted">(opcional)</span>
            <input id="org-img-input" type="file" accept="image/jpeg,image/png">
          </label>
          <button class="primary-button" type="submit">Criar</button>
        </form>

        <div class="sidebar-user">
          <div class="avatar-upload-wrap">
            <span class="avatar avatar-upload" data-current-avatar>
              <span class="avatar-upload-hint">✎</span>
            </span>
            <input id="pfp-upload-input" type="file" accept="image/jpeg,image/png,image/gif" class="sr-only">
          </div>
          <div>
            <a class="profile-link" data-current-user data-current-profile-link href="#">Usuário</a>
            <span>Conta ativa</span>
          </div>
          <button data-logout class="icon-menu" type="button" aria-label="Sair">Sair</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Visão geral</p>
            <h1 id="dashboard-title">Olá</h1>
            <p id="dashboard-subtitle" class="muted">Suas organizações.</p>
          </div>
          <div class="topbar-actions">
            <span id="api-status" class="status-chip">API pronta</span>
          </div>
        </header>

        <div class="user-search-bar">
          <div class="inline-form">
            <input id="user-search-input" type="text" placeholder="Pesquisar usuários..." autocomplete="off">
            <button id="user-search-btn" class="ghost-button" type="button">Buscar</button>
          </div>
          <div id="user-search-results" class="user-search-results is-hidden"></div>
        </div>

        <section id="dashboard-content" class="dashboard-content">
          <section id="invites-panel" class="panel is-hidden" aria-labelledby="invites-title">
            <div class="panel-heading horizontal">
              <div>
                <p class="eyebrow">Pendentes</p>
                <h2 id="invites-title">Convites recebidos</h2>
              </div>
              <span id="invites-count" class="count-pill">0</span>
            </div>
            <div id="invites-list" class="invites-grid"></div>
          </section>

          <section class="panel" aria-labelledby="orgs-title">
            <div class="panel-heading">
              <p class="eyebrow">Minhas organizações</p>
              <h2 id="orgs-title">Organizações</h2>
            </div>
            <div id="orgs-list" class="orgs-grid"></div>
          </section>
        </section>
      </main>
    </section>
    <script src="./js/app.js" defer></script>
  </body>
</html>
