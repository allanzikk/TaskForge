<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Organizações | TaskForge</title>
    <link rel="icon" href="/icons/TaskForgeLogo.png">
    <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body data-page="dashboard">
    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>
    <section class="app-shell">

      <!-- ── Sidebar ──────────────────────────────────────────── -->
      <aside class="sidebar sidebar-clean">
        <div class="brand-lockup sidebar-brand">
          <img class="brand-mark" src="/icons/TaskForgeLogo.png" alt="TaskForge">
          <strong class="brand-label">TaskForge</strong>
        </div>

        <nav class="page-nav" aria-label="Navegação principal">
          <a class="nav-link active" href="#" data-nav-page="dashboard">
            <span class="nav-icon">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".9"/>
                <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/>
                <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".6"/>
                <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/>
              </svg>
            </span>
            <span class="nav-label">Organizações</span>
          </a>
        
          <button class="nav-link" id="open-chat-drawer" type="button" aria-label="Chats">
            <span class="nav-icon">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M14 9.5A5.5 5.5 0 018.5 15H3a1 1 0 01-1-1V9.5a5.5 5.5 0 0111 0z" stroke="currentColor" stroke-width="1.4"/><path d="M5 7V2.5A1.5 1.5 0 016.5 1h6A1.5 1.5 0 0114 2.5V7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            </span>
            <span class="nav-label">Chats</span>
          </button>
        </nav>

        <div class="sidebar-spacer"></div>

        <!-- User -->
        <div class="sidebar-user">
          <div class="avatar-upload-wrap">
            <span class="avatar avatar-upload" data-current-avatar>
              <span class="avatar-upload-hint">✎</span>
            </span>
            <input id="pfp-upload-input" type="file" accept="image/jpeg,image/png,image/gif" class="sr-only">
          </div>
          <div class="sidebar-user-info">
            <a class="profile-link" data-current-user data-current-profile-link href="#">Usuário</a>
            <span>Conta ativa</span>
          </div>
          <button data-logout class="icon-menu sidebar-logout" type="button" aria-label="Sair">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10.5 5.5L13 8l-2.5 2.5M13 8H6M6 2.5H3.5A1 1 0 002.5 3.5v9a1 1 0 001 1H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </aside>

      <!-- ── Main Workspace ──────────────────────────────────── -->
      <main class="workspace workspace-org">

        <!-- Header -->
        <header class="org-header-bar">
          <div class="org-header-identity">
            <div class="org-header-text">
              <p class="eyebrow">TaskForge</p>
              <h1 id="dashboard-title">Organizações</h1>
              <p class="org-header-desc">Seus workspaces, membros e trabalho em aberto.</p>
            </div>
          </div>

          <div class="org-header-meta">
            <div class="org-meta-row">
              <div class="org-meta-item">
                <span class="org-meta-label">Workspaces</span>
                <strong id="orgs-total" style="font-size:1.1rem;font-weight:700;color:var(--text);letter-spacing:-0.02em;">0</strong>
              </div>
              <div class="org-meta-item">
                <span class="org-meta-label">Tarefas abertas</span>
                <strong id="open-tasks-total" style="font-size:1.1rem;font-weight:700;color:var(--text);letter-spacing:-0.02em;">0</strong>
              </div>
            </div>
          </div>

          <div class="org-header-actions">
            <button id="new-org-btn" class="primary-button" type="button">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              Nova Organização
            </button>
          </div>
        </header>

        <!-- Busca -->
        <section class="dashboard-command">
          <div class="org-search-box">
            <span class="search-icon">
              <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
                <path d="M9 17A8 8 0 1 0 9 1a8 8 0 0 0 0 16Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                <path d="m19 19-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </span>
            <input id="org-search-input" type="search" placeholder="Pesquisar organizações..." autocomplete="off">
            <button id="org-search-btn" class="ghost-button" type="button">Buscar</button>
          </div>
          <span id="orgs-result-label" class="status-chip subdued">Todas</span>
        </section>

        <!-- Conteúdo -->
        <section id="dashboard-content" class="dashboard-content">

          <!-- Convites (oculto quando vazio) -->
          <section id="invites-panel" class="panel is-hidden" aria-labelledby="invites-title">
            <div class="panel-heading horizontal">
              <div>
                <p class="eyebrow">Pendentes</p>
                <h2 id="invites-title">Convites recebidos</h2>
              </div>
              <span id="invites-count" class="count-pill">0</span>
            </div>
            <div id="invites-list" class="invites-grid"></div>
          </section>

          <!-- Board de orgs -->
          <section class="orgs-board" aria-labelledby="orgs-title">
            <div class="panel-heading horizontal">
              <div>
                <p class="eyebrow">Workspaces</p>
                <h2 id="orgs-title">Suas organizações</h2>
              </div>
            </div>
            <div id="orgs-list" class="orgs-grid"></div>
          </section>

        </section>
      </main>
    </section>

    <!-- ── Modal: Nova Organização ──────────────────────────────── -->
    <dialog id="new-org-modal" class="project-modal">
      <div class="project-modal-inner">
        <div class="project-modal-header">
          <div>
            <p class="eyebrow">Workspaces</p>
            <h2>Nova Organização</h2>
          </div>
          <button id="close-org-modal" class="modal-close-btn" type="button" aria-label="Fechar">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </div>
        <form id="create-org-form" class="project-modal-form">
          <label>
            Nome da organização
            <input id="org-name-input" type="text" minlength="3" maxlength="30" placeholder="Ex: Acme Corp, Equipe Produto…" required autofocus>
          </label>
          <label>
            Descrição
            <input id="org-description-input" type="text" minlength="3" maxlength="120" placeholder="Descreva brevemente o propósito da organização" required>
          </label>
          <label>
            Imagem <span class="label-optional">(opcional)</span>
            <input id="org-img-input" type="file" accept="image/jpeg,image/png">
          </label>
          <div class="project-modal-actions">
            <button id="cancel-org-modal" class="ghost-button" type="button">Cancelar</button>
            <button class="primary-button" type="submit" style="justify-content:center;">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
              Criar organização
            </button>
          </div>
        </form>
      </div>
    </dialog>

    <script src="./js/app.js" defer></script>
    <script>
      (function() {
        function openOrgModal() {
          document.getElementById('new-org-modal')?.showModal();
        }
        function closeOrgModal() {
          const m = document.getElementById('new-org-modal');
          if (m?.open) m.close();
        }

        document.getElementById('new-org-btn')?.addEventListener('click', openOrgModal);
        document.getElementById('close-org-modal')?.addEventListener('click', closeOrgModal);
        document.getElementById('cancel-org-modal')?.addEventListener('click', closeOrgModal);
        document.getElementById('new-org-modal')?.addEventListener('click', function(e) {
          if (e.target === this) closeOrgModal();
        });

        // Fechar após submissão bem-sucedida (app.js limpa o form e redireciona)
        document.getElementById('create-org-form')?.addEventListener('submit', function() {
          setTimeout(closeOrgModal, 300);
        });
      })();
    </script>
  
    <!-- __ Chat Drawer __ -->
    <div id="chat-drawer" class="chat-drawer" aria-hidden="true">
      <div class="chat-drawer-inner">
        <div id="chat-org-list-view" class="chat-view">
          <div class="chat-drawer-header">
            <div><p class="eyebrow">Mensagens</p><h2>Chats</h2></div>
            <button id="close-chat-drawer" class="modal-close-btn" type="button" aria-label="Fechar">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div id="chat-org-list" class="chat-org-list"></div>
        </div>
        <div id="chat-messages-view" class="chat-view is-hidden">
          <div class="chat-drawer-header">
            <button id="chat-back-btn" class="ghost-button chat-back-btn" type="button">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div style="flex:1"><p class="eyebrow">Canal geral</p><h2 id="chat-org-name" style="font-size:1rem;margin:0">—</h2></div>
            <button id="close-chat-drawer-2" class="modal-close-btn" type="button" aria-label="Fechar">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            </button>
          </div>
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-row">
            <input id="chat-input" type="text" placeholder="Mensagem..." maxlength="1000" autocomplete="off">
            <button id="chat-send-btn" class="primary-button" type="button">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M14 8L2 2l3 6-3 6 12-6z" fill="currentColor"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="chat-backdrop" class="chat-backdrop"></div>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </body>
</html>
